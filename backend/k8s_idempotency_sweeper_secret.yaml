apiVersion: v1
kind: Secret
metadata:
  name: idempotency-sweeper-secrets
  namespace: staging
type: Opaque
stringData:
  # Replace these with staging/production values or inject via your secret manager
  DATABASE_URL: "postgresql://<user>:<pass>@<host>:5432/<db>"
  IDEMPOTENCY_PROCESSING_TIMEOUT_MINUTES: "30"
  IDEMPOTENCY_SWEEPER_LIMIT: "200"
  # If sweeper needs other envs (e.g., MERCADOPAGO_*), include them here for staging/prod
  # MERCADOPAGO_ACCESS_TOKEN: "<staging-token>"
