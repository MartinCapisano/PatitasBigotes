# Render Blueprint for the PatitasBigotes backend (FastAPI web service).
#
# The database is NOT declared here: it lives in Supabase (a separate project),
# wired via DATABASE_URL. All secrets and real URLs are set in the Render
# dashboard, not in this file — see backend/.env.production.example for the full
# list of variables to configure.
#
# Free-tier note: this service sleeps after ~15 min without traffic and takes
# 30-60s to answer the first request on wake. The frontend timeout and the
# external maintenance ping (GitHub Actions cron) are designed around that.
services:
  - type: web
    name: patitasbigotes-api
    runtime: python
    plan: free
    rootDir: backend
    # alembic runs against Supabase; the project must be un-paused for a deploy.
    buildCommand: "pip install -r requirements.txt && alembic upgrade head"
    # --forwarded-allow-ips '*' habilita el ProxyHeadersMiddleware de Uvicorn para
    # que reescriba request.client.host desde X-Forwarded-For. Sin esto la IP que
    # ven los rate limits es la del proxy de Render, igual para todos los usuarios.
    # El '*' es seguro solo porque el contenedor no es alcanzable directamente:
    # todo el ingreso pasa por el edge de Render, que no publica un CIDR estable.
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT --forwarded-allow-ips '*'"
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: PYTHON_VERSION
        value: "3.12.7"
      # Declarada aca con valor y no en el dashboard porque su ausencia no se
      # nota: obtener_config_jwt() no tiene default para esta variable y tira
      # RuntimeError si esta vacia, pero recien al emitir un token. La app
      # arranca perfecto -- health check verde, catalogo visible -- y el login
      # responde 500. No es un secreto, asi que no hay razon para dejarla
      # dependiendo de que alguien se acuerde de cargarla.
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "120"
      # Secrets / environment-specific values: set these in the dashboard.
      # sync: false keeps them out of the repo and prompts on blueprint setup.
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: APP_BASE_URL
        sync: false
      - key: CORS_ALLOW_ORIGINS
        sync: false
      - key: AUTH_COOKIE_SAMESITE
        sync: false
      - key: AUTH_COOKIE_SECURE
        sync: false
      # Transferencia bancaria: unico metodo de pago online. El backend
      # no arranca si falta alguna. Ver docs/banktransfer.md.
      - key: BANK_TRANSFER_ALIAS
        sync: false
      - key: BANK_TRANSFER_CBU
        sync: false
      - key: BANK_TRANSFER_BANK_NAME
        sync: false
      - key: BANK_TRANSFER_HOLDER
        sync: false
      - key: BANK_TRANSFER_CUIT
        sync: false
      - key: WHATSAPP_NUMBER
        sync: false
      # Candado de la pausa de MercadoPago: en false el backend rechaza
      # iniciar pagos con method=mercadopago. Ver docs/mercadopago.md.
      - key: MERCADOPAGO_ENABLED
        value: "false"
      - key: MERCADOPAGO_ACCESS_TOKEN
        sync: false
      - key: MERCADOPAGO_ENV
        sync: false
      - key: MERCADOPAGO_SUCCESS_URL
        sync: false
      - key: MERCADOPAGO_FAILURE_URL
        sync: false
      - key: MERCADOPAGO_PENDING_URL
        sync: false
      - key: MERCADOPAGO_NOTIFICATION_URL
        sync: false
      - key: MERCADOPAGO_WEBHOOK_SECRET
        sync: false
      # SMTP (Gmail): sin esto no sale ni la verificacion de email ni el reset
      # de contrasena ni los avisos de una orden. El backend no arranca si falta
      # alguna en produccion. Ver docs/15_Configuracion.md.
      #
      # MAIL_FROM tiene que ser la MISMA direccion que SMTP_USERNAME: Gmail
      # reescribe el header From si no coinciden, y el cliente termina viendo
      # la casilla de todos modos.
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USE_TLS
        value: "true"
      - key: MAIL_FROM
        value: patitasbigotes@gmail.com
      - key: SMTP_USERNAME
        value: patitasbigotes@gmail.com
      # App password de Google, no la contrasena de la cuenta. Requiere tener
      # la verificacion en 2 pasos activada, sino Google no ofrece la opcion.
      - key: SMTP_PASSWORD
        sync: false
      - key: MAINTENANCE_RUN_TOKEN
        sync: false
