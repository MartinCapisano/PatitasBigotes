name: Maintenance ping

# Drives the production maintenance jobs on the free-tier deployment.
# A single scheduled ping does triple duty:
#   1. runs one pass of every maintenance job (reconcile payments, reprocess
#      webhooks, expire stock reservations, sweep idempotency, prune tokens),
#   2. keeps the Render web service warm (it sleeps after ~15 min idle),
#   3. keeps the Supabase project active (it pauses after 7 days idle).
#
# Requires two repository secrets:
#   PROD_API_BASE_URL  -> e.g. https://patitasbigotes-api.onrender.com
#   MAINTENANCE_RUN_TOKEN -> same value set on the backend (see .env.production.example)

on:
  schedule:
    # Every ~13 minutes (under Render's 15-min idle window). GitHub may delay
    # scheduled runs under load; that is acceptable for maintenance.
    - cron: "*/13 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger maintenance run
        env:
          API_BASE_URL: ${{ secrets.PROD_API_BASE_URL }}
          MAINTENANCE_RUN_TOKEN: ${{ secrets.MAINTENANCE_RUN_TOKEN }}
        run: |
          if [ -z "$API_BASE_URL" ] || [ -z "$MAINTENANCE_RUN_TOKEN" ]; then
            echo "Missing PROD_API_BASE_URL or MAINTENANCE_RUN_TOKEN secret." >&2
            exit 1
          fi
          # --max-time is generous to absorb Render's cold start (30-60s).
          curl -fsS -X POST "${API_BASE_URL%/}/internal/maintenance/run" \
            -H "Authorization: Bearer ${MAINTENANCE_RUN_TOKEN}" \
            --max-time 150
