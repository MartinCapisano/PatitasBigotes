apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: idempotency-sweeper-secrets
  namespace: production
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-secret-store   # replace with your SecretStore name
    kind: SecretStore
  target:
    name: idempotency-sweeper-secrets
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: secret/data/patitas/production/database
        property: DATABASE_URL
    - secretKey: IDEMPOTENCY_PROCESSING_TIMEOUT_MINUTES
      remoteRef:
        key: secret/data/patitas/production/idempotency
        property: IDEMPOTENCY_PROCESSING_TIMEOUT_MINUTES
    - secretKey: IDEMPOTENCY_SWEEPER_LIMIT
      remoteRef:
        key: secret/data/patitas/production/idempotency
        property: IDEMPOTENCY_SWEEPER_LIMIT
  # Optional: map other provider secrets if you store them centrally
  # e.g., MERCADOPAGO_ACCESS_TOKEN, MERCADOPAGO_ENV
